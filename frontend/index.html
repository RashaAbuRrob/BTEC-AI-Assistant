<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد BTEC الذكي - BTEC Smart Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            direction: rtl;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0A5B7A 0%, #06414f 50%, #208EB0 100%);
            min-height: 100vh;
            color: #333;
            overflow-x: hidden;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            min-height: 100vh;
            align-items: start;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .header {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.9) 100%);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .header-logo {
            font-size: 3.5em;
            animation: float 3s ease-in-out infinite;
        }

        .header-text h1 {
            font-size: 2.5em;
            font-weight: 800;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #0A5B7A 0%, #208EB0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-text p {
            color: #666;
            font-size: 1.1em;
            font-weight: 400;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .main-area {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 25px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 1024px) {
            .main-area {
                grid-template-columns: 1fr;
            }
        }

        .upload-section {
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.9) 100%);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            height: fit-content;
        }

        .upload-section h2 {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #0A5B7A;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-upload-wrapper {
            border: 2px dashed #0A5B7A;
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            background: rgba(10, 91, 122, 0.02);
        }

        .file-upload-wrapper:hover {
            background: rgba(10, 91, 122, 0.05);
            border-color: #208EB0;
        }

        .file-upload-wrapper i {
            font-size: 2.5em;
            color: #0A5B7A;
            display: block;
            margin-bottom: 10px;
        }

        #fileInput {
            display: none;
        }

        .upload-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0A5B7A 0%, #208EB0 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(10, 91, 122, 0.3);
        }

        .upload-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .document-list {
            margin-top: 30px;
        }

        .document-list h3 {
            font-size: 1.1em;
            margin-bottom: 15px;
            color: #444;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 8px;
        }

        .doc-item {
            background: white;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9em;
            border: 1px solid #eee;
            transition: all 0.2s ease;
        }

        .doc-item:hover {
            border-color: #0A5B7A;
            transform: translateX(-5px);
        }

        .doc-icon {
            font-size: 1.2em;
        }

        .doc-info {
            flex: 1;
            overflow: hidden;
        }

        .doc-name {
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 600;
        }

        .doc-meta {
            font-size: 0.8em;
            color: #888;
        }

        .chat-container {
            background: linear-gradient(135deg, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0.95) 100%);
            border-radius: 20px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            height: 700px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-content {
            max-width: 70%;
            padding: 14px 18px;
            border-radius: 15px;
            line-height: 1.6;
            word-wrap: break-word;
            font-size: 1em;
        }

        .message.assistant .message-content {
            background: linear-gradient(135deg, #f0f7fa 0%, #e8f0f5 100%);
            color: #333;
            border: 1px solid rgba(10, 91, 122, 0.2);
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #0A5B7A 0%, #208EB0 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(10, 91, 122, 0.3);
        }

        .message-label {
            font-size: 0.8em;
            color: #999;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .input-area {
            padding: 25px;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            gap: 12px;
        }

        #queryInput {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e8e8ff;
            border-radius: 12px;
            font-size: 1em;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
            background: #fafbff;
        }

        #queryInput:focus {
            outline: none;
            border-color: #0A5B7A;
            background: white;
            box-shadow: 0 0 0 3px rgba(10, 91, 122, 0.1);
        }

        .send-btn {
            padding: 14px 28px;
            background: linear-gradient(135deg, #0A5B7A 0%, #208EB0 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            font-size: 1em;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 5px 20px rgba(10, 91, 122, 0.3);
        }

        .send-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(10, 91, 122, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #0A5B7A;
            animation: loading 1.4s infinite;
            margin: 0 3px;
        }

        @keyframes loading {
            0%, 80%, 100% { opacity: 0.3; transform: scale(1); }
            40% { opacity: 1; transform: scale(1.2); }
        }

        .status-message {
            padding: 14px 18px;
            border-radius: 12px;
            text-align: center;
            font-size: 0.95em;
            font-weight: 600;
            animation: slideIn 0.4s ease;
        }

        .status-success {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-error {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-info {
            background: linear-gradient(135deg, #d1ecf1 0%, #bee5eb 100%);
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #0A5B7A 0%, #208EB0 100%);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #06414f 0%, #0A5B7A 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-content">
                <div class="header-logo">🤖</div>
                <div class="header-text">
                    <h1>مساعد BTEC الذكي</h1>
                    <p>BTEC Smart Assistant</p>
                </div>
            </div>
        </div>

        <div class="main-area">
            <div class="upload-section">
                <h2><span>📄</span> رفع مستندات BTEC</h2>
                <div class="file-upload-wrapper" onclick="document.getElementById('fileInput').click()">
                    <i>📁</i>
                    <p id="fileNameDisplay">اضغط لرفع ملف PDF</p>
                    <input type="file" id="fileInput" accept=".pdf">
                </div>
                <button class="upload-btn" id="uploadBtn">رفع وفهرسة المستند</button>
                <div id="uploadStatus"></div>

                <div class="document-list">
                    <h3>المستندات المفهرسة</h3>
                    <div id="docsList">
                        <div class="status-message status-info">جاري تحميل المستندات...</div>
                    </div>
                </div>
            </div>

            <div class="chat-container">
                <div class="messages" id="messagesContainer">
                    <div class="message assistant">
                        <div>
                            <div class="message-label">المساعد</div>
                            <div class="message-content">
                                أهلا وسهلا! أنا مساعد BTEC الذكي. اسأل عن أي شيء يتعلق بـ BTEC والمؤهلات والبرامج والمزايا. 📚
                            </div>
                        </div>
                    </div>
                </div>
                <div class="input-area">
                    <input 
                        type="text" 
                        id="queryInput" 
                        placeholder="اطرح سؤالاً عن BTEC..."
                        autocomplete="off"
                    />
                    <button class="send-btn" id="sendBtn">إرسال</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000/api';

        const queryInput = document.getElementById('queryInput');
        const sendBtn = document.getElementById('sendBtn');
        const messagesContainer = document.getElementById('messagesContainer');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const docsList = document.getElementById('docsList');
        const uploadStatus = document.getElementById('uploadStatus');

        // Load documents on startup
        fetchDocuments();

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                fileNameDisplay.textContent = e.target.files[0].name;
                fileNameDisplay.style.color = '#0A5B7A';
                fileNameDisplay.style.fontWeight = 'bold';
            }
        });

        async function fetchDocuments() {
            try {
                const response = await fetch(`${API_BASE_URL}/assistant/documents`);
                const data = await response.json();

                if (data.status === 'success') {
                    renderDocuments(data.documents);
                }
            } catch (error) {
                console.error('Error fetching documents:', error);
                docsList.innerHTML = '<div class="status-message status-error">فشل تحميل المستندات</div>';
            }
        }

        function renderDocuments(documents) {
            if (documents.length === 0) {
                docsList.innerHTML = '<div class="status-message status-info">لا توجد مستندات مرفوعة</div>';
                return;
            }

            docsList.innerHTML = documents.map(doc => `
                <div class="doc-item">
                    <span class="doc-icon">📄</span>
                    <div class="doc-info">
                        <span class="doc-name" title="${doc.filename}">${doc.filename}</span>
                        <span class="doc-meta">${doc.word_count} كلمة • ${new Date(doc.timestamp).toLocaleDateString('ar-SA')}</span>
                    </div>
                </div>
            `).join('');
        }

        async function uploadFile() {
            const file = fileInput.files[0];
            if (!file) {
                showStatus(uploadStatus, 'يرجى اختيار ملف أولاً', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            uploadBtn.disabled = true;
            uploadBtn.textContent = 'جاري الرفع...';
            showStatus(uploadStatus, 'جاري رفع وفهرسة المستند...', 'info');

            try {
                const response = await fetch(`${API_BASE_URL}/pdf/upload`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    showStatus(uploadStatus, 'تم رفع وفهرسة المستند بنجاح!', 'success');
                    fileInput.value = '';
                    fileNameDisplay.textContent = 'اضغط لرفع ملف PDF';
                    fileNameDisplay.style.color = '#666';
                    fileNameDisplay.style.fontWeight = 'normal';
                    fetchDocuments();

                    // Add AI notification
                    addMessage('assistant', `تمت إضافة المستند "${data.filename}" إلى قاعدة بياناتي. يمكنك الآن سؤالي عنه! 📚`);
                } else {
                    showStatus(uploadStatus, `خطأ: ${data.error}`, 'error');
                }
            } catch (error) {
                showStatus(uploadStatus, `خطأ في الاتصال: ${error.message}`, 'error');
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = 'رفع وفهرسة المستند';
            }
        }

        function showStatus(container, message, type) {
            container.innerHTML = `<div class="status-message status-${type}">${message}</div>`;
            if (type === 'success' || type === 'error') {
                setTimeout(() => {
                    if (container.firstChild && container.firstChild.textContent === message) {
                        container.innerHTML = '';
                    }
                }, 5000);
            }
        }

        uploadBtn.addEventListener('click', uploadFile);

        async function sendQuery() {
            const query = queryInput.value.trim();
            if (!query) return;

            addMessage('user', query);
            queryInput.value = '';
            sendBtn.disabled = true;

            const loadingMsg = addMessage('assistant', 'جاري المعالجة...');
            const loader = document.createElement('div');
            loader.style.display = 'flex';
            loader.style.gap = '5px';
            loader.innerHTML = '<div class="loading"></div><div class="loading"></div><div class="loading"></div>';
            const msgContent = loadingMsg.querySelector('.message-content');
            msgContent.innerHTML = '';
            msgContent.appendChild(loader);

            try {
                const response = await fetch(`${API_BASE_URL}/assistant/query`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });

                const data = await response.json();

                if (response.ok) {
                    loadingMsg.remove();
                    addMessage('assistant', data.response || 'لم يتم إنشاء رد');
                } else {
                    msgContent.textContent = `خطأ: ${data.error}`;
                }
            } catch (error) {
                msgContent.textContent = `خطأ: ${error.message}`;
            } finally {
                sendBtn.disabled = false;
                queryInput.focus();
            }
        }

        function addMessage(role, content) {
            const messageEl = document.createElement('div');
            messageEl.className = `message ${role}`;
            messageEl.innerHTML = `
                <div>
                    <div class="message-label">${role === 'user' ? 'أنت' : 'المساعد'}</div>
                    <div class="message-content">${content}</div>
                </div>
            `;
            messagesContainer.appendChild(messageEl);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            return messageEl;
        }

        sendBtn.addEventListener('click', sendQuery);
        queryInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendQuery();
            }
        });
    </script>
</body>
</html>
