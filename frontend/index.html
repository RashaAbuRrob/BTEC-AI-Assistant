<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>اسأل الذكاء الاصطناعي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0A5B7A;
      --primary-deep: #06414f;
      --primary-soft: #16789a;
      --accent: #CEB616;
      --accent-soft: #e1cd43;
      --glow: #208EB0;
      --ink: #231f20;
      --bg: #eef3f5;
      --card: #fbfbfc;
      --panel: #edf2f6;
      --line: #e1e8ed;
      --line-soft: #e7edf0;
      --text: #355764;
      --muted: #93a2ab;
      --white: #ffffff;
      --shadow: 0 18px 45px rgba(6, 65, 79, 0.12);
      --bottom-glow: 0 70px 160px rgba(32, 142, 176, 0.55);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background:
        radial-gradient(circle at 10% 100%, rgba(32, 142, 176, 0.42), transparent 22%),
        linear-gradient(180deg, #edf2f4 0%, #eef3f5 100%);
      color: var(--text);
    }

    .page {
      width: 100vw;
      height: 100vh;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .shell {
      width: min(1180px, 100%);
      height: calc(100vh - 48px);
      display: grid;
      grid-template-rows: 136px 1fr;
      gap: 18px;
    }

    .hero {
      background: linear-gradient(180deg, rgba(255,255,255,0.82), rgba(251,251,252,0.96));
      border: 1px solid rgba(255,255,255,0.88);
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .hero-badge {
      height: 44px;
      min-width: 214px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid var(--line-soft);
      background: linear-gradient(180deg, #ffffff, #f8fafb);
      box-shadow: 0 8px 18px rgba(6, 65, 79, 0.05);
      color: #2e6780;
      font-size: 13px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
    }

    .hero-badge span {
      color: #efc548;
    }

    .hero-brand {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .hero-icon {
      width: 82px;
      height: 82px;
      border-radius: 23px;
      background: linear-gradient(135deg, var(--primary), var(--glow));
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      box-shadow: 0 16px 30px rgba(10, 91, 122, 0.22);
      animation: float 4s ease-in-out infinite;
      flex-shrink: 0;
    }

    .hero-copy h1 {
      color: var(--primary-deep);
      font-size: 40px;
      line-height: 1;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .hero-copy p {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .card {
      background: linear-gradient(180deg, rgba(251,252,252,0.98), rgba(247,249,250,0.98));
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 28px;
      box-shadow: var(--shadow), var(--bottom-glow), 0 0 0 1px rgba(255,255,255,0.35);
      overflow: hidden;
      display: grid;
      grid-template-rows: 78px 1fr 138px;
    }

    .topbar {
      background: #edf2f6;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
    }

    .topbar-pill {
      height: 40px;
      min-width: 110px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid #d9e3e8;
      background: linear-gradient(180deg, #edf2f5, #e7edf1);
      color: #8796a0;
      font-size: 12px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
      white-space: nowrap;
    }

    .assistant-meta {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .assistant-avatar {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--primary), var(--glow));
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 10px 20px rgba(10, 91, 122, 0.18);
      animation: float 4s ease-in-out infinite;
      flex-shrink: 0;
    }

    .assistant-copy h2 {
      color: var(--primary-deep);
      font-size: 14px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 2px;
    }

    .assistant-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #92a0a8;
      font-size: 12px;
      font-weight: 700;
    }

    .assistant-status .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #84ca59;
      box-shadow: 0 0 0 4px rgba(132, 202, 89, 0.11);
    }

    .messages {
      background: #ffffff;
      padding: 14px 20px;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    .section-label {
      color: #95a2aa;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .message-row {
      display: flex;
      flex-direction: row-reverse;
      align-items: flex-start;
      gap: 12px;
      justify-content: flex-end;
    }

    .message-row + .message-row {
      margin-top: 12px;
    }

    .message-row.assistant {
      animation: slideRight 0.35s ease;
    }

    .message-row.user {
      animation: slideLeft 0.35s ease;
    }

    .message-avatar {
      width: 42px;
      height: 42px;
      border-radius: 15px;
      background: linear-gradient(180deg, #f7f8fb, #edf2f5);
      border: 1px solid #e1e8ed;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #96a6ae;
      flex-shrink: 0;
    }

    .message-bubble {
      max-width: 670px;
      padding: 14px 20px;
      border-radius: 20px;
      background: linear-gradient(180deg, #ffffff, #fafcfc);
      border: 1px solid #e8eef2;
      box-shadow: 0 10px 18px rgba(6, 65, 79, 0.04);
      color: #4a6771;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.9;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .message-bubble:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(6, 65, 79, 0.08);
    }

    .message-bubble.user {
      background: linear-gradient(135deg, var(--primary), var(--glow));
      color: #fff;
      border: none;
      direction: rtl;
    }

    .message-bubble .spark {
      color: #efc54c;
    }

    .bottom {
      background: #f2f6f8;
      border-top: 1px solid #e0e8ec;
      padding: 14px 16px 14px;
      display: grid;
      grid-template-rows: 54px 1fr;
      gap: 14px;
    }

    .input-row {
      display: grid;
      grid-template-columns: 106px 1fr;
      gap: 12px;
      align-items: center;
    }

    .send-btn {
      width: 106px;
      height: 54px;
      border: none;
      border-radius: 19px;
      background: linear-gradient(135deg, #d1b50a, #dfc821);
      color: var(--ink);
      font-family: 'Cairo', sans-serif;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(206, 182, 22, 0.28);
      transition: .2s ease;
    }

    .send-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 30px rgba(206, 182, 22, 0.34);
    }

    .input-wrap {
      height: 54px;
      background: linear-gradient(180deg, #ffffff, #fbfcfd);
      border: 1px solid #e5ecef;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 14px;
    }

    .input-action {
      width: 36px;
      height: 36px;
      border-radius: 14px;
      border: 1px solid #e3eaee;
      background: linear-gradient(180deg, #f7f9fb, #edf2f5);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }

    textarea {
      flex: 1;
      height: 100%;
      border: none;
      outline: none;
      background: transparent;
      resize: none;
      padding-top: 16px;
      font-family: 'Cairo', sans-serif;
      color: #50707a;
      font-size: 14px;
      font-weight: 700;
    }

    textarea::placeholder {
      color: #a1afb6;
    }

    .quick-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .quick-pill {
      min-width: 170px;
      height: 42px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid #e4ebef;
      background: linear-gradient(180deg, #ffffff, #f8fafb);
      color: var(--primary);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(6, 65, 79, 0.04);
      white-space: nowrap;
      transition: .2s ease;
    }

    .quick-pill:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(6, 65, 79, 0.07);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    @keyframes slideRight {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes slideLeft {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @media (max-width: 1000px) {
      .hero-copy h1 {
        font-size: 30px;
      }

      .hero-copy p {
        font-size: 12px;
      }

      .hero-badge {
        min-width: 170px;
        font-size: 11px;
      }

      .quick-actions {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="shell">
      <header class="hero">
        <div class="hero-brand">
          <div class="hero-icon">✦</div>
          <div class="hero-copy">
            <h1>اسأل الذكاء الاصطناعي</h1>
            <p>مساعدك الذكي متواجد هنا لخدمتك دائماً.</p>
          </div>
        </div>

        <div class="hero-badge"><span>✨</span>The Ministry of Education</div>
      </header>

      <main class="card">
        <div class="topbar">
          <div class="assistant-meta">
            <div class="assistant-avatar">🤖</div>
            <div class="assistant-copy">
              <h2>BTEC Smart Assistant</h2>
              <div class="assistant-status"><span class="dot"></span> جاهز لخدمتك</div>
            </div>
          </div>

          <div class="topbar-pill">AI Assistant</div>
        </div>

        <section class="messages" id="messages">
          <div class="section-label">المساعد</div>

          <div class="message-row assistant">
            <div class="message-avatar">🤖</div>
            <div class="message-bubble">
 مرحبا أنا مساعدك المدعوم بالذكاء الاصطناعي لا تتردد في الاستفسار عن أي شيء ؟              <span class="spark">✨</span>
            </div>
          </div>
        </section>

        <div class="bottom">
          <div class="input-row">
            <button class="send-btn" id="sendBtn">إرسال</button>

            <div class="input-wrap">
              <div class="input-action">✎</div>
              <textarea id="queryInput" rows="1" placeholder="اطرح سؤالك هنا..."></textarea>
            </div>
          </div>

          <div class="quick-actions">
            <button class="quick-pill" type="button">كيف أجدد التأمين الصحي
 ؟</button>
            <button class="quick-pill" type="button">★ ما هي الاوراق اللازمة لتقديم معالمة تحويل راتب
؟</button>
            <button class="quick-pill" type="button"> كيف أختار تخصص BTEC المناسب؟</button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    const API_BASE_URL = 'http://localhost:5000/api';
    const queryInput = document.getElementById('queryInput');
    const sendBtn = document.getElementById('sendBtn');
    const messagesContainer = document.getElementById('messages');
    const quickPrompts = document.querySelectorAll('.quick-pill');

    async function sendQuery(prefilledText = null) {
      const query = (prefilledText ?? queryInput.value).trim();
      if (!query) return;

      addMessage('user', query);
      queryInput.value = '';
      sendBtn.disabled = true;

      try {
        const response = await fetch(`${API_BASE_URL}/assistant/query`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query })
        });

        const data = await response.json();
        addMessage(
          'assistant',
          response.ok
            ? (data.response || 'لم يتم إنشاء رد.')
            : `خطأ: ${data.error || 'حدث خطأ غير متوقع'}`
        );
      } catch (error) {
        addMessage('assistant', `خطأ: ${error.message}`);
      } finally {
        sendBtn.disabled = false;
        queryInput.focus();
      }
    }

    function addMessage(role, content) {
      const row = document.createElement('div');
      row.className = `message-row ${role}`;
      row.style.justifyContent = role === 'user' ? 'flex-start' : 'flex-end';

      const avatar = role === 'user' ? '👤' : '🤖';
      const bubbleClass = role === 'user' ? 'message-bubble user' : 'message-bubble';

      row.innerHTML = `
        <div class="message-avatar">${avatar}</div>
        <div class="${bubbleClass}">${content}</div>
      `;

      messagesContainer.appendChild(row);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    sendBtn.addEventListener('click', () => sendQuery());

    queryInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendQuery();
      }
    });

    quickPrompts.forEach((btn) => {
      btn.addEventListener('click', () => sendQuery(btn.textContent.trim()));
    });
  </script>
</body>
</html>
